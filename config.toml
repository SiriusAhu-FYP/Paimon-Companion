[game]
name = "2048"
window_title = "2048"

[orchestrator]
max_iterations = 30
move_delay_ms = 150
verify_after_action = true

[vlm]
# 本地 vLLM 服务（WSL/Linux 上的 Qwen-VL），无需认证
base_url = "http://localhost:8000/v1"
model = "Qwen/Qwen3-VL-2B-Instruct"

[llm]
base_url = "https://www.dmxapi.cn/v1/"
model = "gpt-4o"
temperature = 0.3
# api_key 从 .env 读取: LLM_API_KEY

[companion]
character = "paimon"
expression_enabled = false

[logging]
level = "INFO"
directory = "logs"
save_screenshots = true
